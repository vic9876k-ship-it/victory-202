<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PurposePartner Dashboard - Accountability Heroes</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="icons/icon128.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .header {
            background: rgba(139, 21, 56, 0.95);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--secondary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .logout-btn {
            background: transparent;
            color: white;
            border: 1px solid white;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: white;
            color: var(--primary-color);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .welcome-section {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: #666;
            font-size: 0.9rem;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .feature-item {
            background: white;
            padding: 1.5rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .feature-item h3 {
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 1rem;
        }

        .btn:hover {
            background: #7a1f3a;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 1rem;
            }

            .container {
                padding: 1rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .features-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <i class="fas fa-shield-alt"></i>
            PurposePartner
        </div>
        <div class="user-info">
            <div class="user-avatar" id="user-avatar">U</div>
            <span id="user-name">User</span>
            <button class="logout-btn" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </header>

    <div class="container">
        <section class="welcome-section">
            <h1 id="welcome-name">Welcome!</h1>
            <p>You are making a difference in people's lives through accountability and encouragement.</p>
        </section>

        <!-- Pairing Section -->
        <section style="margin: 20px 0; padding: 20px; background: var(--light-color); border-radius: 10px;">
            <h3 style="color: var(--primary-color); margin-bottom: 15px;">Device Pairing</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <input id="pairingCodeInput" placeholder="Enter pairing code" style="flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px;" />
                <button id="pairDeviceBtn" style="padding: 10px 20px; background: var(--primary-color); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px;">Pair Device</button>
            </div>
            <div id="pairStatus" style="margin-top: 10px; color: var(--dark-color);"></div>
        </section>

        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="partners-count">0</div>
                <div class="stat-label">Connected Partners</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="encouragements-count">0</div>
                <div class="stat-label">Encouragements Sent</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="victories-count">0</div>
                <div class="stat-label">Victories Celebrated</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="days-active">0</div>
                <div class="stat-label">Days Active</div>
            </div>
        </section>

        <section class="features-grid">
            <div class="feature-item">
                <h3><i class="fas fa-bell"></i> Notifications</h3>
                <p>View encouragement requests from your accountability partners.</p>
                <button class="btn">View Notifications</button>
            </div>
        </section>
    </div>

    <!-- Firebase SDK for Auth + Firestore -->
    <script type="module">
        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, collection, query, where, orderBy, limit, onSnapshot, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4HhpXcYdGhvFRIz4IHksilgnMnRDbiS8",
            authDomain: "victory-fb944.firebaseapp.com",
            projectId: "victory-fb944",
            storageBucket: "victory-fb944.firebasestorage.app",
            messagingSenderId: "650310438797",
            appId: "1:650310438797:web:c0bd9a1caaa6093d5137c4"
        };

        // 🔥 Initialize Firebase FIRST
        const app = getApps().length
            ? getApps()[0]
            : initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js')
                .then(reg => {
                    console.log("Service Worker registered:", reg);
                    return navigator.serviceWorker.ready;
                })
                .then(() => {
                    console.log("Service Worker is ready");
                    
                    // Wait a moment then check controller
                    setTimeout(() => {
                        console.log("Service worker controller after delay:", navigator.serviceWorker.controller);
                    }, 1000);
                })
                .catch(err => console.error("SW registration failed:", err));
        }

        // Set persistence to keep user logged in across page reloads
        await setPersistence(auth, browserLocalPersistence);

        // Check for paired device first
        const pairedUserId = localStorage.getItem("pairedUserId");
        console.log("Paired userId from localStorage:", pairedUserId);

        // Pairing button event listener
        document.getElementById("pairDeviceBtn").addEventListener("click", async () => {
            const enteredCode = document.getElementById("pairingCodeInput").value.trim();
            const pairStatus = document.getElementById("pairStatus");
            
            console.log("Entered pairing code:", enteredCode);
            
            if (!enteredCode) {
                pairStatus.textContent = "Please enter a pairing code";
                pairStatus.style.color = "var(--accent-color)";
                return;
            }

            try {
                // Query Firestore for pairing code
                const pairingQuery = query(
                    collection(db, "pairing"),
                    where("code", "==", enteredCode),
                    where("isUsed", "==", false)
                );

                const querySnapshot = await getDocs(pairingQuery);
                
                if (querySnapshot.empty) {
                    pairStatus.textContent = "Invalid or expired code";
                    pairStatus.style.color = "var(--accent-color)";
                    console.log("No pairing code found");
                    return;
                }

                // Get the pairing document
                const pairingDoc = querySnapshot.docs[0];
                const userId = pairingDoc.data().userId;
                
                console.log("Paired userId:", userId);
                
                // Save locally
                localStorage.setItem("pairedUserId", userId);
                
                // Mark as used
                await updateDoc(pairingDoc.ref, { isUsed: true });
                
                pairStatus.textContent = "Device paired successfully!";
                pairStatus.style.color = "var(--success-color)";
                document.getElementById("pairingCodeInput").value = "";
                
            } catch (error) {
                console.error("Pairing error:", error);
                pairStatus.textContent = "Error pairing device";
                pairStatus.style.color = "var(--accent-color)";
            }
        });

        onAuthStateChanged(auth, (user) => {
            console.log("Auth check fired", user);

            if (user) {
                console.log("User authenticated:", user.uid);
                
                // Debug: Check service worker status
                console.log("Service worker controller:", navigator.serviceWorker.controller);
                
                // Request notification permission
                if (Notification.permission !== "granted") {
                    Notification.requestPermission().then(permission => {
                        console.log("Permission:", permission);
                    });
                }
                
                // Debug: Check current permission
                console.log("Current notification permission:", Notification.permission);
                
                // Listen for blocked events from extension
                if (pairedUserId) {
                    console.log("Listening for user:", pairedUserId);
                    
                    const q = query(
                        collection(db, "blockedEvents"),
                        where("userId", "==", pairedUserId),
                        orderBy("timestamp", "desc"),
                        limit(10)
                    );

                    onSnapshot(q, (snapshot) => {
                    snapshot.docChanges().forEach((change) => {

                        if (change.type === "added") {
                            const data = change.doc.data();

                            console.log("🔥 CHANGE TYPE:", change.type);
                            console.log("🔥 DATA:", change.doc.data());
                            console.log("🔥 NEW EVENT DETECTED:", data);

                            navigator.serviceWorker.ready.then((registration) => {
                                const rawSite = data.site || "unknown";

                                // 🔥 Clean the URL dynamically
                                const cleanSite = rawSite
                                    .replace(/^https?:\/\//, "")
                                    .replace(/^www\./, "")
                                    .split("/")[0];

                                const message = `Access attempt blocked: ${cleanSite}`;

                                console.log("🚀 Notification message:", message);

                                registration.showNotification("Blocked Attempt 🚫", {
                                    body: message,
                                    icon: "/icons/icon128.png",
                                    tag: cleanSite + "-" + Date.now(), // ensures uniqueness per site
                                    renotify: true
                                });
                            });
                        }

                    });
                }, (error) => {
                    console.error("Firestore listener error:", error);
                    if (error.message.includes("requires an index")) {
                        console.log("🔥 Firestore Index Required:");
                        console.log("1. Click the Firebase Console link in the error message");
                        console.log("2. Create the composite index for: userId (==) and timestamp (desc)");
                        console.log("3. Wait for the index to build (1-2 minutes)");
                        console.log("4. Refresh the dashboard page");
                    }
                });
                } else {
                    console.log("No paired device - not listening for blocked events");
                }
                
                return;
            }

            console.log("No authenticated user.");
            window.location.href = "index.html";
        });

        // Notification helper function
        function showNotification(data) {
            const site = data.site || "Unknown";

            navigator.serviceWorker.ready.then((registration) => {
                console.log("🔥 Showing notification for:", site);

                registration.showNotification("Blocked Site 🚫", {
                    body: `You blocked: ${site}`,
                    icon: "/icons/icon-192.png",
                    tag: "blocked-site",
                    renotify: true
                });
            });
        }

        // Logout button event listener
        document.getElementById("logoutBtn").addEventListener("click", async () => {
            await signOut(auth); // Sign out using Firebase Auth
            window.location.href = "index.html"; // Redirect to index page
        });
    </script>
</body>
</html>
